name: Gateway Benchmark

on:
  workflow_dispatch:
    inputs:
      gateway:
        description: "envoy | ngf | cilium"
        required: true
        default: "envoy"
      version:
        description: "gateway version"
        required: true
        default: "v1.7.1"

jobs:
  benchmark:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' '${{ secrets.SSH_KEY }}' > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Discover target from master
        run: |
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no "${{ secrets.USERNAME }}@${{ secrets.MASTER_IP }}" '
            set -eo pipefail

            GATEWAY="${{ github.event.inputs.gateway }}"
            BASE="/tmp/gateway-benchmark/scripts/deploy/${GATEWAY}"

            . "${BASE}/metadata.env"

            SERVICE_NAME=$(kubectl -n "$SERVICE_NAMESPACE" get svc \
              -o jsonpath="{range .items[*]}{.metadata.name}{\"\n\"}{end}" \
              | grep -E "$SERVICE_NAME_REGEX" | head -n1)

            HTTP_PORT=$(kubectl -n "$SERVICE_NAMESPACE" get svc "$SERVICE_NAME" \
              -o jsonpath="{.spec.ports[?(@.port==80)].nodePort}")

            HTTPS_PORT=$(kubectl -n "$SERVICE_NAMESPACE" get svc "$SERVICE_NAME" \
              -o jsonpath="{.spec.ports[?(@.port==443)].nodePort}")

            POD_NODE=$(kubectl get pods -n default -l app=perf-backend \
              -o jsonpath='{.items[0].spec.nodeName}')

            NODE_IP=$(kubectl get node "$POD_NODE" \
              -o jsonpath='{.status.addresses[?(@.type=="InternalIP")].address}')
            
            echo "NODE_IP=$NODE_IP"
            echo "HTTP_PORT=$HTTP_PORT"
            echo "HTTPS_PORT=$HTTPS_PORT"
            echo "HOST_HEADER=$HOST_HEADER"
            echo "GATEWAY=${{ github.event.inputs.gateway }}"
            echo "VERSION=${{ github.event.inputs.version }}"
          ' > benchmark-target.env

          cat benchmark-target.env

          . ./benchmark-target.env

          echo "NODE_IP=$NODE_IP" >> "$GITHUB_ENV"
          echo "HTTP_PORT=$HTTP_PORT" >> "$GITHUB_ENV"
          echo "HTTPS_PORT=$HTTPS_PORT" >> "$GITHUB_ENV"
          echo "HOST_HEADER=$HOST_HEADER" >> "$GITHUB_ENV"
          echo "GATEWAY=$GATEWAY" >> "$GITHUB_ENV"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Copy test scripts to traffic generator
        run: |
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no "${{ secrets.USERNAME }}@${{ secrets.TG_IP }}" 'mkdir -p /tmp/gateway-benchmark'
          scp -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no -r \
            scripts/tests \
            "${{ secrets.USERNAME }}@${{ secrets.TG_IP }}:/tmp/gateway-benchmark/"

      - name: Run k6 tests on traffic generator
        run: |
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no "${{ secrets.USERNAME }}@${{ secrets.TG_IP }}" "
            set -eo pipefail
            mkdir -p /tmp/k6-results
            rm -f /tmp/k6-results/*.json || true
            cd /tmp/gateway-benchmark/tests

            export TARGET_NODE_IP='${NODE_IP}'
            export TARGET_HTTP_PORT='${HTTP_PORT}'
            export TARGET_HTTPS_PORT='${HTTPS_PORT}'
            export TARGET_HOST='${HOST_HEADER}'
            export GATEWAY='${GATEWAY}'
            export VERSION='${VERSION}'

            echo 'Running throughput test'
            k6 run m01-throughput.js --summary-export=/tmp/k6-results/m01-throughput.json

            if [ -f m04-tls-handshake.js ] && [ -n \"${TARGET_HTTPS_PORT}\" ]; then
              echo 'Running TLS handshake test'
              k6 run m04-tls-handshake.js --summary-export=/tmp/k6-results/m04-tls-handshake.json
            fi

            cat > /tmp/k6-results/run-metadata.json <<EOF
            {
              \"gateway\": \"${GATEWAY}\",
              \"version\": \"${VERSION}\",
              \"node_ip\": \"${TARGET_NODE_IP}\",
              \"http_port\": \"${TARGET_HTTP_PORT}\",
              \"https_port\": \"${TARGET_HTTPS_PORT}\",
              \"host_header\": \"${TARGET_HOST}\"
            }
            EOF

            ls -l /tmp/k6-results
          "

      - name: Download results from traffic generator
        run: |
          mkdir -p downloaded-results
          scp -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no -r \
            "${{ secrets.USERNAME }}@${{ secrets.TG_IP }}:/tmp/k6-results" \
            ./downloaded-results/

      - name: Show downloaded files
        run: |
          find ./downloaded-results -type f | sort

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f scripts/report/requirements.txt ]; then
            pip install -r scripts/report/requirements.txt
          fi

      - name: Generate webpage
        run: |
          mkdir -p public
          python scripts/report/generate_dashboard.py \
            --results-dir "./downloaded-results/k6-results" \
            --output-dir "./public"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gateway-benchmark-results
          path: |
            downloaded-results
            public

      - name: Publish to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public