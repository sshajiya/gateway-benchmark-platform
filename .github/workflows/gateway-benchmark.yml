name: Run k6 remotely and generate webpage

on:
  workflow_dispatch:
    inputs:
      script_name:
        description: "k6 script file name already present on TG"
        required: true
        default: "m01-throughput.js"
      script_dir:
        description: "Directory on TG containing k6 and python scripts"
        required: true
        default: "/home/sh.shaik/envoy-benchmark-tests"
      python_script:
        description: "Python script name already present on TG"
        required: true
        default: "generate_report.py"

jobs:
  benchmark:
    runs-on: ubuntu-latest

    steps:
      - name: Prepare SSH key
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.TG_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.TG_HOST }}" >> ~/.ssh/known_hosts

      - name: Run k6 and generate webpage on TG
        shell: bash
        run: |
          set -euo pipefail

          ssh -i ~/.ssh/id_rsa "${{ secrets.TG_USER }}@${{ secrets.TG_HOST }}" <<EOF
            set -euo pipefail

            SCRIPT_DIR='${{ github.event.inputs.script_dir }}'
            SCRIPT_NAME='${{ github.event.inputs.script_name }}'
            PYTHON_SCRIPT='${{ github.event.inputs.python_script }}'

            cd "\$SCRIPT_DIR"

            echo "Working directory: \$(pwd)"
            echo "Checking files..."
            ls -1

            command -v k6 >/dev/null 2>&1 || { echo "k6 is not installed"; exit 1; }
            command -v python3 >/dev/null 2>&1 || { echo "python3 is not installed"; exit 1; }

            [ -f "\$SCRIPT_NAME" ] || { echo "Missing k6 script: \$SCRIPT_NAME"; exit 1; }
            [ -f "\$PYTHON_SCRIPT" ] || { echo "Missing python script: \$PYTHON_SCRIPT"; exit 1; }

            mkdir -p results logs public

            TS=\$(date +%Y%m%d-%H%M%S)
            BASE_NAME="\${SCRIPT_NAME%.js}"
            JSON_OUT="results/\${TS}-\${BASE_NAME}.json"
            LOG_OUT="logs/\${TS}-\${BASE_NAME}.log"
            HTML_OUT="public/index.html"

            echo "Running k6 script: \$SCRIPT_NAME"
            k6 run "\$SCRIPT_NAME" --summary-export "\$JSON_OUT" | tee "\$LOG_OUT"

            echo "Generating webpage using: \$PYTHON_SCRIPT"
            python3 "\$PYTHON_SCRIPT" --input "\$JSON_OUT" --output "\$HTML_OUT"

            echo "Completed successfully"
            echo "JSON: \$JSON_OUT"
            echo "LOG : \$LOG_OUT"
            echo "HTML: \$HTML_OUT"
          EOF

      - name: Copy webpage and artifacts from TG
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p site results logs

          scp -i ~/.ssh/id_rsa "${{ secrets.TG_USER }}@${{ secrets.TG_HOST }}:/home/sh.shaik/envoy-benchmark-tests/public/index.html" site/index.html
          scp -i ~/.ssh/id_rsa "${{ secrets.TG_USER }}@${{ secrets.TG_HOST }}:/home/sh.shaik/envoy-benchmark-tests/results/"*.json results/ || true
          scp -i ~/.ssh/id_rsa "${{ secrets.TG_USER }}@${{ secrets.TG_HOST }}:/home/sh.shaik/envoy-benchmark-tests/logs/"*.log logs/ || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: |
            site/index.html
            results/
            logs/
