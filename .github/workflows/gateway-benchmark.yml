name: Gateway Benchmark Platform

on:
  workflow_dispatch:
    inputs:
      gateway:
        description: "envoy | ngf | cilium"
        required: true
        default: "envoy"
      version:
        description: "gateway version"
        required: true
        default: "v1.7.1"
      destroy:
        description: "Destroy existing gateway? (true/false)"
        required: true
        default: "false"
      deploy:
        description: "Deploy gateway? (true/false)"
        required: true
        default: "true"
      benchmark:
        description: "Run benchmark? (true/false)"
        required: true
        default: "true"

jobs:
  deploy-validate:
    runs-on: ubuntu-latest
    outputs:
      node_ip: ${{ steps.export.outputs.node_ip }}
      http_port: ${{ steps.export.outputs.http_port }}
      https_port: ${{ steps.export.outputs.https_port }}
      host_header: ${{ steps.export.outputs.host_header }}
      ready_for_benchmark: ${{ steps.export.outputs.ready_for_benchmark }}

    steps:
      - uses: actions/checkout@v4

      - name: Copy scripts to master
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.MASTER_IP }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          source: "scripts"
          target: "/tmp/gateway-benchmark"

      - name: Deploy / Validate
        id: run
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.MASTER_IP }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script_stop: true
          script: |
            set +e
            set +u

            GATEWAY="${{ github.event.inputs.gateway }}"
            VERSION="${{ github.event.inputs.version }}"
            DESTROY="${{ github.event.inputs.destroy }}"
            DEPLOY="${{ github.event.inputs.deploy }}"
            BENCHMARK="${{ github.event.inputs.benchmark }}"

            BASE="/tmp/gateway-benchmark/scripts/deploy/${GATEWAY}"
            COMMON="/tmp/gateway-benchmark/scripts/deploy/common"

            [ -f "${COMMON}/cleanup_gateway.sh" ] && chmod +x "${COMMON}/cleanup_gateway.sh"
            [ -f "${BASE}/install.sh" ] && chmod +x "${BASE}/install.sh"

            # ✅ SAFE metadata loading
            if [ -f "${BASE}/metadata.env" ]; then
              . "${BASE}/metadata.env"
            else
              echo "metadata.env not found, using defaults"
            fi

            # ✅ DEFAULTS
            GATEWAY_NAMESPACE=${GATEWAY_NAMESPACE:-default}
            GATEWAY_NAME=${GATEWAY_NAME:-envoy-gateway}
            SERVICE_NAMESPACE=${SERVICE_NAMESPACE:-envoy-gateway-system}
            SERVICE_NAME_REGEX=${SERVICE_NAME_REGEX:-^envoy-default-}
            HOST_HEADER=${HOST_HEADER:-perf.example.com}

            echo "=== INPUTS ==="
            echo "$GATEWAY $VERSION $DESTROY $DEPLOY $BENCHMARK"

            if [ "$DESTROY" = "true" ]; then
              kubectl delete gateway --all -A --ignore-not-found || true
              kubectl delete httproute --all -A --ignore-not-found || true
              kubectl delete gatewayclass --all --ignore-not-found || true
              "${COMMON}/cleanup_gateway.sh" "$GATEWAY" || true
            fi

            # destroy-only mode → skip benchmark
            if [ "$DESTROY" = "true" ] && [ "$DEPLOY" = "false" ]; then
              echo "READY_FOR_BENCHMARK=false" > /tmp/output.env
              exit 0
            fi

            if [ "$DEPLOY" = "true" ]; then
              "${BASE}/install.sh" "$VERSION"
              kubectl apply -f /tmp/gateway-benchmark/scripts/apps/perf-backend.yaml
              kubectl rollout status deployment/perf-backend -n default --timeout=180s
              kubectl apply -f "${BASE}/gateway.yaml"
            else
              echo "Reusing existing deployment"
            fi

            # NodePort patch (safe)
            SVC=$(kubectl -n "$SERVICE_NAMESPACE" get svc \
              -o jsonpath='{range .items[*]}{.metadata.name}{"\n"}{end}' \
              | grep -E "$SERVICE_NAME_REGEX" | head -n1 || true)

            if [ -n "$SVC" ]; then
              kubectl -n "$SERVICE_NAMESPACE" patch svc "$SVC" \
                -p '{"spec":{"type":"NodePort"}}' || true
            fi

            # Gateway status check
            STATUS=$(kubectl -n "$GATEWAY_NAMESPACE" get gateway "$GATEWAY_NAME" \
              -o jsonpath='{.status.conditions[?(@.type=="Programmed")].status}' 2>/dev/null || true)

            if [ "$DEPLOY" = "true" ] && [ "$STATUS" != "True" ]; then
              echo "Gateway not ready after deploy"
              exit 1
            else
              echo "Reuse mode or ready gateway"
            fi

            NODE_IP=$(kubectl get nodes -o jsonpath='{.items[0].status.addresses[?(@.type=="InternalIP")].address}')

            SERVICE_NAME=$(kubectl -n "$SERVICE_NAMESPACE" get svc \
              -o jsonpath='{range .items[*]}{.metadata.name}{"\n"}{end}' \
              | grep -E "$SERVICE_NAME_REGEX" | head -n1 || true)

            if [ -z "$SERVICE_NAME" ]; then
              echo "READY_FOR_BENCHMARK=false" > /tmp/output.env
              exit 0
            fi

            HTTP_PORT=$(kubectl -n "$SERVICE_NAMESPACE" get svc "$SERVICE_NAME" \
              -o jsonpath='{.spec.ports[?(@.port==80)].nodePort}')

            HTTPS_PORT=$(kubectl -n "$SERVICE_NAMESPACE" get svc "$SERVICE_NAME" \
              -o jsonpath='{.spec.ports[?(@.port==443)].nodePort}')

            READY_FOR_BENCHMARK=false

            if [ "$BENCHMARK" = "true" ]; then
              HTTP_OK=false
              HTTPS_OK=false

              curl -vk --max-time 10 -H "Host: $HOST_HEADER" \
                "http://$NODE_IP:$HTTP_PORT/" && HTTP_OK=true

              curl -vk --max-time 10 \
                --resolve "$HOST_HEADER:$HTTPS_PORT:$NODE_IP" \
                "https://$HOST_HEADER:$HTTPS_PORT/" && HTTPS_OK=true

              if [ "$HTTP_OK" = "true" ] && [ "$HTTPS_OK" = "true" ]; then
                READY_FOR_BENCHMARK=true
              fi
            fi

            cat > /tmp/output.env <<EOF
            NODE_IP=$NODE_IP
            HTTP_PORT=$HTTP_PORT
            HTTPS_PORT=$HTTPS_PORT
            HOST_HEADER=$HOST_HEADER
            READY_FOR_BENCHMARK=$READY_FOR_BENCHMARK
            EOF

      - name: Fetch outputs
        id: export
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.MASTER_IP }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cat /tmp/output.env

      - name: Set outputs
        run: |
          echo "${{ steps.export.outputs.stdout }}" > output.env
          source output.env

          echo "node_ip=$NODE_IP" >> $GITHUB_OUTPUT
          echo "http_port=$HTTP_PORT" >> $GITHUB_OUTPUT
          echo "https_port=$HTTPS_PORT" >> $GITHUB_OUTPUT
          echo "host_header=$HOST_HEADER" >> $GITHUB_OUTPUT
          echo "ready_for_benchmark=$READY_FOR_BENCHMARK" >> $GITHUB_OUTPUT

  benchmark:
    needs: deploy-validate
    if: ${{ github.event.inputs.benchmark == 'true' && needs.deploy-validate.outputs.ready_for_benchmark == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Copy k6 scripts to TG
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.TG_IP }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          source: "scripts/tests"
          target: "/tmp/gateway-benchmark"

      - name: Run k6
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.TG_IP }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            mkdir -p /tmp/k6-results
            cd /tmp/gateway-benchmark/scripts/tests

            k6 run m01-throughput-v02.js --summary-export=/tmp/k6-results/m01.json || true
            k6 run m04-tls-handshake.js --summary-export=/tmp/k6-results/m04.json || true

      - name: Download results
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.TG_IP }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          source: "/tmp/k6-results/*"
          target: "./results"

      - name: Generate webpage
        run: |
          mkdir -p public
          echo "<html><body><h1>Gateway Benchmark</h1><pre>" > public/index.html
          cat results/tmp/k6-results/m01.json >> public/index.html || true
          cat results/tmp/k6-results/m04.json >> public/index.html || true
          echo "</pre></body></html>" >> public/index.html

      - name: Publish
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
